name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate starter contract
        run: npm run validate

      - name: Check types and registry
        run: npm run check

      - name: Scan consumer files
        run: npm run scan

      - name: Run tests
        run: npm run test
